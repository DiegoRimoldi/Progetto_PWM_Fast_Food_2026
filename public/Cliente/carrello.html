<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FastFood - Carrello</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #ffffff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .layout {
      display: flex;
      min-height: 100vh;
    }

    /* SIDEBAR */
    .sidebar {
      width: 250px;
      background-color: #ffffff;
      box-shadow: 2px 0 5px rgba(0,0,0,0.1);
      padding: 1rem;
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      text-align: center;
      margin-bottom: 1rem;
    }

    .sidebar-header img {
      max-width: 150px;
    }

    .sidebar a.nav-link {
      color: #555;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      margin-bottom: 0.5rem;
      text-decoration: none;
      transition: 0.3s;
    }

    .sidebar a.nav-link.active,
    .sidebar a.nav-link:hover {
      background-color: #fecd4c;
      color: #000;
    }

    /* CONTENUTO */
    .main-content {
      flex: 1;
      padding: 2rem;
    }

    .cart-container {
      max-width: 600px;
      margin: auto;
    }

    .cart-item {
      flex-wrap: wrap;
      gap: 10px;
    }

    .cart-item strong {
      flex: 1 1 100%;
    }

    /* 📱 MOBILE */
    @media (max-width: 768px) {

      .layout {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        flex-direction: row;
        overflow-x: auto;
        align-items: center;
        justify-content: flex-start;
      }

      .sidebar-header {
        display: none;
      }

      .sidebar a.nav-link {
        margin: 0 5px;
        white-space: nowrap;
        font-size: 0.9rem;
      }

      .main-content {
        padding: 1rem;
      }

      h2 {
        font-size: 1.5rem;
        text-align: center;
      }

      .cart-item {
        flex-direction: column;
        align-items: flex-start;
      }

      .cart-item span {
        font-size: 0.9rem;
      }
    }
  </style>
</head>

<body>

<script>
(function() {
  var token = localStorage.getItem("token");
  var role = localStorage.getItem("role");
  if (!token || role !== "cliente") {
    window.location.href = "../login.html";
  }
})();
</script>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <img src="logo.png" alt="FastFood Logo" />
    </div>

    <a href="home.html" class="nav-link">Home</a>
    <a href="carrello.html" class="nav-link active">Carrello</a>
    <a href="ordini.html" class="nav-link">Ordini</a>
    <a href="../profilo.html" class="nav-link">Profilo</a>
    <a href="../logout.html" class="nav-link">Logout</a>
  </div>

  <!-- CONTENUTO -->
  <div class="main-content">
    <h2>Carrello</h2>

    <div class="cart-container">
      <div id="cartItems"></div>
      <button id="orderBtn" class="btn btn-warning w-100 mt-3">Ordina</button>
      <div id="message" class="mt-3"></div>
    </div>
  </div>

</div>

<script>
var apiBase = "http://localhost:3000";
var carrello = [];
var indirizzoUtente = "";

async function fetchConControlloToken(url, options = {}) {
  var token = localStorage.getItem("token");

  if (!token) {
    window.location.href = "../logout.html";
    return;
  }

  options.headers = options.headers || {};
  options.headers["Authorization"] = "Bearer " + token;

  try {
    let response = await fetch(url, options);

    if (response.status === 401) {
      window.location.href = "../logout.html";
    }

    return response;
  } catch (error) {
    console.error("Errore nella richiesta API:", error);
    return null;
  }
}

async function recuperaCarrello() {
  try {
    var response = await fetchConControlloToken(apiBase + "/carts/me");

    if (!response.ok) throw new Error();

    carrello = await response.json();
    mostraCarrello();
  } catch (err) {
    document.getElementById("cartItems").innerHTML =
      '<p class="text-muted">Il carrello è vuoto.</p>';
  }
}

async function recuperaIndirizzoUtente() {
  try {
    var response = await fetchConControlloToken(apiBase + "/users/me");
    var user = await response.json();
    indirizzoUtente = user.indirizzo || "";
  } catch (err) {
    console.error(err);
  }
}

async function mostraCarrello() {
  var container = document.getElementById("cartItems");
  container.innerHTML = "";

  if (!carrello.meals || carrello.meals.length === 0) {
    container.innerHTML = '<p class="text-muted">Il carrello è vuoto.</p>';
    return;
  }

  var gruppi = {};
  var nomi = {};

  await Promise.all(carrello.meals.map(async p => {
    if (!nomi[p.ristorante_id]) {
      try {
        var r = await fetchConControlloToken(`${apiBase}/restaurants/${p.ristorante_id}`);
        if (r.ok) {
          var data = await r.json();
          nomi[p.ristorante_id] = data.name;
        }
      } catch {
        nomi[p.ristorante_id] = "Ristorante";
      }
    }
  }));

  carrello.meals.forEach(p => {
    gruppi[p.ristorante_id] = gruppi[p.ristorante_id] || [];
    gruppi[p.ristorante_id].push(p);
  });

  Object.keys(gruppi).forEach(id => {
    var h = document.createElement("h5");
    h.textContent = "Ordine da " + nomi[id];
    container.appendChild(h);

    gruppi[id].forEach(p => {
      var div = document.createElement("div");
      div.className = "d-flex justify-content-between align-items-center mb-3 cart-item";

      div.innerHTML = `
        <strong>${p.nome}</strong>
        <span>${p.quantita} x €${p.prezzo_unitario.toFixed(2)}</span>
        <button class="btn btn-danger btn-sm" onclick="rimuoviDalCarrello('${p._id}')">Elimina</button>
      `;
      container.appendChild(div);
    });

    var scelta = document.createElement("div");
    scelta.innerHTML = `
      <input type="radio" name="ritiro_${id}" value="Ritiro" checked> Ritiro
      <input type="radio" name="ritiro_${id}" value="Consegna: ${indirizzoUtente}"> Consegna
      <hr>
    `;
    container.appendChild(scelta);
  });
}

async function rimuoviDalCarrello(id) {
  await fetchConControlloToken(apiBase + "/carts/remove", {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ meal_id: id })
  });
  recuperaCarrello();
}

document.getElementById("orderBtn").addEventListener("click", async () => {
  alert("Ordine effettuato!");
});

(async function init() {
  await recuperaIndirizzoUtente();
  await recuperaCarrello();
})();
</script>

</body>
</html>
