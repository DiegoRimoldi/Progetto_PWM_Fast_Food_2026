<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FastFood</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  display: flex;
  min-height: 100vh;
}

.sidebar {
  width: 250px;
  padding: 1rem;
  box-shadow: 2px 0 5px rgba(0,0,0,0.1);
}

.nav-link:hover {
  background: #fecd4c;
}

.main-content {
  flex: 1;
  padding: 2rem;
}
</style>
</head>

<body>

<script>
(function () {
  const token = localStorage.getItem("token");
  const ruolo = localStorage.getItem("ruolo");

  if (!token || ruolo !== "cliente") {
    window.location.href = "../login.html";
  }
})();
</script>

<div class="sidebar">
  <a href="#" class="nav-link">Home</a>
</div>

<div class="main-content">

<h2>Ristoranti</h2>

<input id="searchByName" placeholder="Nome" class="form-control mb-2">
<input id="searchByAddress" placeholder="Indirizzo" class="form-control mb-3">

<div id="ristorantiContainer" class="row"></div>

</div>

<script>
const apiBase = "http://localhost:3000";

async function fetchAuth(url) {
  const token = localStorage.getItem("token");

  const res = await fetch(url, {
    headers: { Authorization: "Bearer " + token }
  });

  if (res.status === 401) {
    window.location.href = "../logout.html";
    return null;
  }

  return res;
}

async function ricerca() {
  const name = document.getElementById("searchByName").value;
  const address = document.getElementById("searchByAddress").value;

  const res = await fetchAuth(
    `${apiBase}/restaurants/search?q=${encodeURIComponent(name)}&address=${encodeURIComponent(address)}`
  );

  if (!res) return;

  const data = await res.json();

  mostra(data.restaurants);
}

function mostra(lista) {
  const container = document.getElementById("ristorantiContainer");
  container.innerHTML = "";

  lista.forEach(r => {
    container.innerHTML += `
      <div class="col-md-4">
        <div class="card mb-3">
          <img src="${r.image || 'https://via.placeholder.com/300'}" class="card-img-top">
          <div class="card-body">
            <h5>${r.name}</h5>
            <p>${r.address}</p>
          </div>
        </div>
      </div>
    `;
  });
}

document.getElementById("searchByName").addEventListener("input", ricerca);
document.getElementById("searchByAddress").addEventListener("input", ricerca);

ricerca();
</script>

</body>
</html>
