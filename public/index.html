<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FastFood</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #fecd4c;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 30px;
      flex-wrap: wrap;
    }

    .logo {
      font-size: 1.8rem;
      font-weight: bold;
      color: #00B5A2;
      text-decoration: none;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px;
      flex-wrap: wrap;
      text-align: center;
    }

    .hero-text {
      max-width: 600px;
    }

    .hero-text h1 {
      font-size: 2.5rem;
      font-weight: 800;
      color: #1e1e1e;
    }

    .hero-text p {
      font-size: 1.1rem;
      margin-top: 15px;
      color: #333;
    }

    .hero-img {
      max-width: 400px;
      margin-top: 30px;
    }

    .btn-custom {
      background-color: #00B5A2;
      color: white;
      padding: 10px 20px;
      font-weight: 600;
      border-radius: 30px;
      margin: 10px 5px;
    }

    .btn-custom:hover {
      background-color: #02685e;
      color: white;
    }

    /* 📱 Mobile */
    @media (max-width: 768px) {
      .hero {
        flex-direction: column;
      }

      .hero-text h1 {
        font-size: 2rem;
      }

      header {
        flex-direction: column;
        gap: 15px;
      }
    }

    /* 💻 Desktop */
    @media (min-width: 992px) {
      .hero {
        justify-content: space-between;
        text-align: left;
        padding: 60px;
      }

      .hero-text h1 {
        font-size: 3rem;
      }

      .hero-img {
        margin-top: 0;
      }
    }
  </style>
</head>

<body>

  <header>
    <a href="#" class="logo">FastFood</a>
    <div>
      <a href="login.html" class="btn btn-custom">Login</a>
      <a href="register.html" class="btn btn-custom">Registrati</a>
    </div>
  </header>

  <section class="hero">
    <div class="hero-text">
      <h1>Consegna veloce, gusto garantito</h1>
      <p>Ordina dai tuoi ristoranti preferiti con un click.</p>
      <a href="login.html" class="btn btn-custom">Inizia ora</a>
    </div>

    <div class="hero-img">
      <img src="logo.png" alt="FastFood Logo" class="img-fluid">
    </div>
  </section>

</body>
</html>
