<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FastFood - Carrello</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #ffffff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 250px;
      background-color: #ffffff;
      box-shadow: 2px 0 5px rgba(0,0,0,0.1);
      padding: 1rem;
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      text-align: center;
      margin-bottom: 1rem;
    }

    .sidebar-header img {
      max-width: 150px;
    }

    .sidebar a.nav-link {
      color: #555;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      margin-bottom: 0.5rem;
      text-decoration: none;
      transition: background-color 0.3s, color 0.3s;
    }

    .sidebar a.nav-link.active,
    .sidebar a.nav-link:hover {
      background-color: #fecd4c;
      color: #000;
    }

    .main-content {
      flex: 1;
      padding: 2rem;
    }

    .cart-container {
      max-width: 600px;
      margin: auto;
    }
  </style>
</head>

<body>

<!-- 🔐 Controllo login -->
<script>
(function () {
  var token = localStorage.getItem("token");
  var role = localStorage.getItem("role");

  if (!token || role !== "cliente") {
    window.location.href = "../login.html";
  }
})();
</script>

<!-- Sidebar -->
<div class="sidebar">
  <div class="sidebar-header">
    <img src="../assets/logo.png" alt="FastFood Logo" />
  </div>

  <a href="home.html" class="nav-link">Home</a>
  <a href="carrello.html" class="nav-link active">Carrello</a>
  <a href="ordini.html" class="nav-link">Ordini</a>
  <a href="../profilo.html" class="nav-link">Profilo</a>
  <a href="../logout.html" class="nav-link">Logout</a>
</div>

<!-- Contenuto -->
<div class="main-content">
  <h2>Carrello</h2>

  <div class="cart-container">
    <div id="cartItems"></div>
    <button id="orderBtn" class="btn btn-warning w-100">Ordina</button>
    <div id="message" class="mt-3"></div>
  </div>
</div>

<script>
var apiBase = "http://localhost:3000";
var carrello = null;
var indirizzoUtente = "";

// 🔐 Fetch con token
async function fetchConControlloToken(url, options = {}) {
  var token = localStorage.getItem("token");

  if (!token) {
    window.location.href = "../logout.html";
    return null;
  }

  options.headers = options.headers || {};
  options.headers["Authorization"] = "Bearer " + token;

  try {
    let response = await fetch(url, options);

    if (response.status === 401) {
      window.location.href = "../logout.html";
      return null;
    }

    return response;
  } catch (error) {
    console.error("Errore API:", error);
    return null;
  }
}

// 📦 Carrello
async function recuperaCarrello() {
  try {
    var response = await fetchConControlloToken(apiBase + "/carts/me");

    if (!response || !response.ok) throw new Error();

    carrello = await response.json();
    mostraCarrello();
  } catch {
    document.getElementById("cartItems").innerHTML =
      '<p class="text-muted">Il carrello è vuoto.</p>';
  }
}

// 📍 Indirizzo utente
async function recuperaIndirizzoUtente() {
  try {
    var response = await fetchConControlloToken(apiBase + "/users/me");

    if (!response || !response.ok) return;

    var user = await response.json();
    indirizzoUtente = user.indirizzo || "";
  } catch (err) {
    console.error("Errore indirizzo:", err);
  }
}

// 🛒 Mostra carrello
async function mostraCarrello() {
  var container = document.getElementById("cartItems");
  container.innerHTML = "";

  if (!carrello || !carrello.meals || carrello.meals.length === 0) {
    container.innerHTML = '<p class="text-muted">Il carrello è vuoto.</p>';
    return;
  }

  var gruppi = {};
  var nomiRistoranti = {};

  // recupero nomi ristoranti
  await Promise.all(carrello.meals.map(async (p) => {
    if (!nomiRistoranti[p.ristorante_id]) {
      try {
        var res = await fetchConControlloToken(apiBase + "/restaurants/" + p.ristorante_id);
        if (res && res.ok) {
          var data = await res.json();
          nomiRistoranti[p.ristorante_id] = data.name;
        }
      } catch {
        nomiRistoranti[p.ristorante_id] = "Ristorante";
      }
    }
  }));

  // raggruppa
  carrello.meals.forEach(p => {
    gruppi[p.ristorante_id] = gruppi[p.ristorante_id] || [];
    gruppi[p.ristorante_id].push(p);
  });

  // stampa
  Object.keys(gruppi).forEach(id => {
    var h = document.createElement("h4");
    h.textContent = "Ordine da " + (nomiRistoranti[id] || "Ristorante");
    container.appendChild(h);

    gruppi[id].forEach(p => {
      var div = document.createElement("div");
      div.className = "d-flex justify-content-between mb-2";

      div.innerHTML = `
        <strong>${p.nome}</strong>
        <span>${p.quantita} x €${p.prezzo_unitario.toFixed(2)}</span>
        <button class="btn btn-danger btn-sm"
          onclick="rimuoviDalCarrello('${p.meal_id}')">Elimina</button>
      `;

      container.appendChild(div);
    });

    var scelta = document.createElement("div");
    scelta.innerHTML = `
      <br>
      <input type="radio" name="ritiro_${id}" value="Ritiro in ristorante" checked>
      Ritiro in ristorante
      <input type="radio" name="ritiro_${id}" value="Consegna a domicilio: ${indirizzoUtente}">
      Consegna a domicilio
      <hr>
    `;
    container.appendChild(scelta);
  });
}

// ❌ Rimuovi
async function rimuoviDalCarrello(mealId) {
  try {
    var response = await fetchConControlloToken(apiBase + "/carts/remove", {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ meal_id: mealId })
    });

    if (!response || !response.ok) throw new Error();

    carrello = await response.json();
    mostraCarrello();
  } catch (err) {
    console.error("Errore rimozione:", err);
  }
}

// 🧾 Ordine
document.getElementById("orderBtn").addEventListener("click", async () => {

  if (!carrello || !carrello.meals || carrello.meals.length === 0) {
    alert("Carrello vuoto!");
    return;
  }

  var sceltaRitiro = {};

  carrello.meals.forEach(m => {
    var sel = document.querySelector(`input[name="ritiro_${m.ristorante_id}"]:checked`);
    sceltaRitiro[m.ristorante_id] = sel ? sel.value : "Ritiro in ristorante";
  });

  var ordini = {};

  carrello.meals.forEach(p => {
    ordini[p.ristorante_id] = ordini[p.ristorante_id] || [];
    ordini[p.ristorante_id].push({
      _id: p.meal_id,
      nome: p.nome,
      quantita: p.quantita,
      prezzo_unitario: p.prezzo_unitario,
      tempo_preparazione: p.tempo_preparazione || 10,
      ristorante_id: p.ristorante_id
    });
  });

  try {
    await Promise.all(Object.keys(ordini).map(async (id) => {
      await fetchConControlloToken(apiBase + "/orders", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          meals: ordini[id],
          metodo_consegna: sceltaRitiro[id]
        })
      });
    }));

    await fetchConControlloToken(apiBase + "/carts/me", {
      method: "DELETE"
    });

    alert("Ordine effettuato!");
    recuperaCarrello();

  } catch (err) {
    console.error("Errore ordine:", err);
    alert("Errore durante ordine");
  }
});

// 🚀 Init
(async function () {
  await recuperaIndirizzoUtente();
  await recuperaCarrello();
})();
</script>

</body>
</html>
