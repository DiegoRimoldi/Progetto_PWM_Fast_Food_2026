<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FastFood - Aggiungi Piatto Personalizzato</title>
  <!-- Versione stabile Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #fff;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      min-height: 100vh;
    }
    .sidebar {
      width: 250px;
      background: #fff;
      box-shadow: 2px 0 5px rgba(0,0,0,0.1);
      padding: 1rem;
      display: flex;
      flex-direction: column;
    }
    .sidebar-header {
      text-align: center;
      margin-bottom: 1rem;
    }
    .sidebar-header img {
      max-width: 150px;
    }
    .sidebar a.nav-link {
      color: #555;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      margin-bottom: 0.5rem;
      text-decoration: none;
    }
    .sidebar a.nav-link.active,
    .sidebar a.nav-link:hover {
      background-color: #fecd4c;
      color: #000;
    }
    .main-content {
      flex: 1;
      padding: 2rem;
      overflow-y: auto;
    }
    .main-content h2 {
      color: #00B5A2;
      margin-bottom: 1.5rem;
    }
    .form-container {
      max-width: 600px;
      margin: auto;
    }
  </style>
</head>
<body>
  <script>
    (function() {
      var token = localStorage.getItem("token");
      var role = localStorage.getItem("role");
      if (!token || role !== "ristoratore") {
        window.location.href = "../login.html";
      }
    })();
  </script>

  <div class="sidebar">
    <div class="sidebar-header">
      <img src="../assets/logo.png" alt="FastFood Logo">
    </div>
    <a href="home.html" class="nav-link">Dashboard</a>
    <a href="gestioneRistorante.html" class="nav-link">Gestisci Ristorante</a>
    <a href="piattiGenerici.html" class="nav-link">Aggiungi Piatto Generico</a>
    <a href="piattoPersonalizzato.html" class="nav-link active">Aggiungi Piatto Personalizzato</a>
    <a href="modificaPiattoPersonalizzato.html" class="nav-link">Modifica Piatto Personalizzato</a>
    <a href="ordini.html" class="nav-link">Ordini</a>
    <a href="statistiche.html" class="nav-link">Statistiche</a>
    <a href="../profilo.html" class="nav-link">Profilo</a>
    <a href="../logout.html" class="nav-link">Logout</a>
  </div>
  
  <div class="main-content">
    <h2>Aggiungi Piatto Personalizzato</h2>
    <form id="piattoPersonalizzato" class="form-container">
      <div class="mb-3">
        <label for="strMeal" class="form-label">Nome Piatto *</label>
        <input type="text" id="strMeal" class="form-control" required>
      </div>
      <div class="mb-3">
        <label for="strCategory" class="form-label">Categoria</label>
        <input type="text" id="strCategory" class="form-control" required>
      </div>
      <div class="mb-3">
        <label for="strArea" class="form-label">Area</label>
        <input type="text" id="strArea" class="form-control" required>
      </div>
      <div class="mb-3">
        <label for="prezzo" class="form-label">Prezzo (€)</label>
        <input type="number" id="prezzo" class="form-control" step="0.01" required>
      </div>
      <div class="mb-3">
        <label for="tempo_preparazione" class="form-label">Tempo di Preparazione (min)</label>
        <input type="number" id="tempo_preparazione" class="form-control" required>
      </div>
      <div class="mb-3">
        <label for="ingredients" class="form-label">Ingredienti (separati da virgole)</label>
        <input type="text" id="ingredients" class="form-control" required>
      </div>
      <div class="mb-3">
        <label for="measures" class="form-label">Quantità (separati da virgole, stesso numero degli ingredienti)</label>
        <input type="text" id="measures" class="form-control" required>
      </div>
      <div class="mb-3">
        <label for="strMealThumb" class="form-label">URL Immagine</label>
        <input type="url" id="strMealThumb" class="form-control" required>
      </div>
      <div class="mb-3">
        <label for="strInstructions" class="form-label">Istruzioni</label>
        <textarea id="strInstructions" class="form-control" rows="4" required></textarea>
      </div>
      <button type="submit" class="btn btn-warning">Crea Piatto</button>
    </form>
  </div>

  <script>
    var apiBase = "http://localhost:3000";
    var token = localStorage.getItem("token");
    var userId = localStorage.getItem("userId");
    
    var mioRistorante = null;

    async function fetchConControlloToken(url, options = {}) {
      var tokenLocal = localStorage.getItem("token");
    
      if (!tokenLocal) {
        window.location.href = "../logout.html";
        return null;
      }
    
      options.headers = options.headers || {};
      // Non sovrascrivere accidentalmente Authorization se già presente
      options.headers["Authorization"] = "Bearer " + tokenLocal;
    
      try {
        let response = await fetch(url, options);
    
        if (response.status === 401 || response.status === 403) {
          // token scaduto o invalido
          window.location.href = "../logout.html";
          return null;
        }
    
        return response;
      } catch (error) {
        console.error("Errore nella richiesta API:", error);
        return null;
      }
    }

    async function caricaRistorante() {
      try {
        // Chiamata alla rotta /restaurants/search che ritorna { restaurants: [...] }
        var response = await fetchConControlloToken(apiBase + "/restaurants/search");
        if (!response || !response.ok) {
          console.error("Errore nella risposta ristoranti:", response && response.status);
          return;
        }
        var data = await response.json();
        var restaurants = data.restaurants || [];
        mioRistorante = restaurants.find(r => {
          // r.ristoratore_id potrebbe essere stringa o oggetto; confronto permissivo
          const rid = r.ristoratore_id && (r.ristoratore_id.toString ? r.ristoratore_id.toString() : r.ristoratore_id);
          return rid === userId || (r._id && (r._id.toString ? r._id.toString() : r._id) === userId);
        });
        if (!mioRistorante) {
          alert("Non hai ancora creato un ristorante. Vai alla pagina Gestisci Ristorante per crearlo.");
          window.location.href = "gestioneRistorante.html";
        }
      } catch (err) {
        console.error("Errore nel caricamento del ristorante:", err);
      }
    }

    document.getElementById("piattoPersonalizzato").addEventListener("submit", async function (e) {
      e.preventDefault();

      if (!mioRistorante) {
        alert("Ristorante non trovato. Carica o crea prima il ristorante.");
        return;
      }

      var ingredientsArr = document.getElementById("ingredients").value.split(",").map(i => i.trim()).filter(Boolean);
      var measuresArr = document.getElementById("measures").value.split(",").map(m => m.trim()).filter(Boolean);

      if (ingredientsArr.length !== measuresArr.length) {
        alert("Il numero di ingredienti e quantità deve essere uguale!");
        return;
      }

      var payload = {
        strMeal: document.getElementById("strMeal").value.trim(),
        strCategory: document.getElementById("strCategory").value.trim(),
        strArea: document.getElementById("strArea").value.trim(),
        prezzo: parseFloat(document.getElementById("prezzo").value),
        tempo_preparazione: parseInt(document.getElementById("tempo_preparazione").value),
        ingredients: ingredientsArr,
        measures: measuresArr,
        strMealThumb: document.getElementById("strMealThumb").value.trim(),
        strInstructions: document.getElementById("strInstructions").value.trim(),
        // Assicuriamoci di inviare l'id del ristorante richiesto dal server
        ristorante_id: mioRistorante._id || mioRistorante.id || mioRistorante._id && mioRistorante._id.$oid || mioRistorante._id
      };

      try {
        var response = await fetchConControlloToken(apiBase + "/meals", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        if (!response) {
          throw new Error("Nessuna risposta dal server");
        }

        if (!response.ok) {
          var errorText = await response.text();
          throw new Error("Errore HTTP " + response.status + " - " + errorText);
        }

        alert("Piatto personalizzato creato con successo!");
        // opzionale: reindirizza o pulisci form
        document.getElementById("piattoPersonalizzato").reset();
      } catch (err) {
        console.error("Errore:", err);
        alert(err.message);
      }
    });

    (async function init() { await caricaRistorante(); })();
  </script>
</body>
</html>
