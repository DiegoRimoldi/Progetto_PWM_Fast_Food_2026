<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastFood - Piatti Generici</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    /* ... (I tuoi stili CSS rimangono invariati) ... */
    body { margin: 0; padding: 0; background-color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; min-height: 100vh; }
    .sidebar { width: 250px; background: #fff; box-shadow: 2px 0 5px rgba(0,0,0,0.1); padding: 1rem; display: flex; flex-direction: column; }
    .main-content { flex: 1; padding: 2rem; overflow-y: auto; }
    .meal-card { transition: transform 0.3s; margin-bottom: 1rem; }
    .meal-card:hover { transform: translateY(-3px); }
    .meal-card img { height: 200px; object-fit: cover; }
  </style>
</head>
<body>
  <script>
    (function() {
      var token = localStorage.getItem("token");
      var role  = localStorage.getItem("role");
      if (!token || role !== "ristoratore") {
        window.location.href = "../login.html";
      }
    })();
  </script>
  
  <div class="sidebar">
    <div class="sidebar-header"><img src="../assets/logo.png" alt="Logo" style="max-width:150px;"></div>
    <a href="home.html" class="nav-link">Dashboard</a>
    <a href="gestioneRistorante.html" class="nav-link">Gestisci Ristorante</a>
    <a href="piattiGenerici.html" class="nav-link active">Aggiungi Piatto Generico</a>
    <a href="ordini.html" class="nav-link">Ordini</a>
    <a href="../logout.html" class="nav-link text-danger">Logout</a>
  </div>
  
  <div class="main-content">
    <h2>Piatti Disponibili</h2>
    
    <div class="filter-section row g-2">
      <div class="col-md-3"><input type="text" id="filterName" class="form-control" placeholder="Filtra per nome"></div>
      <div class="col-md-3"><select id="filterCategory" class="form-select"><option value="">Tutte le categorie</option></select></div>
      <div class="col-md-2"><input type="number" id="filterPriceMin" class="form-control" placeholder="Prezzo Min"></div>
      <div class="col-md-2"><input type="number" id="filterPriceMax" class="form-control" placeholder="Prezzo Max"></div>
      <div class="col-md-2"><button id="applyFilter" class="btn btn-warning w-100">Cerca</button></div>
    </div>
    
    <div id="genericMealsContainer" class="row g-4 mt-3"></div>
    <div id="paginationControls" class="pagination-controls mt-4 text-center"></div>
  </div>

  <script>
    const apiBase = "http://localhost:3000";
    const token = localStorage.getItem("token");
    const userId = localStorage.getItem("userId");
  
    let mioRistorante = null; 
    let allMeals = [];
    let filteredMeals = [];
    let currentPage = 1;
    const itemsPerPage = 6;

    async function fetchAuth(url, options = {}) {
      options.headers = {
        ...options.headers,
        "Authorization": "Bearer " + token,
        "Content-Type": "application/json"
      };
      const response = await fetch(url, options);
      if (response.status === 401 || response.status === 403) {
        window.location.href = "../logout.html";
      }
      return response;
    }
  
    async function init() {
      try {
        // 1. Carica ristoranti e trova quello dell'utente
        const resRest = await fetchAuth(`${apiBase}/restaurants/search`);
        const dataRest = await resRest.json();
        // Nota: app.js restituisce { restaurants: [...] }
        mioRistorante = dataRest.restaurants.find(r => r.ristoratore_id === userId);
        
        if (!mioRistorante) {
          alert("Devi prima creare un ristorante!");
          window.location.href = "gestioneRistorante.html";
          return;
        }

        // 2. Carica piatti
        const resMeals = await fetchAuth(`${apiBase}/meals`);
        allMeals = await resMeals.json();
        
        // Filtriamo quelli che non appartengono già a questo ristorante
        filteredMeals = allMeals.filter(m => m.ristorante_id !== mioRistorante._id);
        
        popolaCategorie();
        displayPage(1);
      } catch (err) {
        console.error("Errore init:", err);
      }
    }

    function popolaCategorie() {
      const catSelect = document.getElementById("filterCategory");
      const cats = [...new Set(allMeals.map(m => m.strCategory).filter(Boolean))];
      cats.forEach(c => {
        const opt = new Option(c, c);
        catSelect.add(opt);
      });
    }

    function displayPage(page) {
      currentPage = page;
      const container = document.getElementById("genericMealsContainer");
      container.innerHTML = "";
      
      const start = (page - 1) * itemsPerPage;
      const items = filteredMeals.slice(start, start + itemsPerPage);

      items.forEach(p => {
        const col = document.createElement("div");
        col.className = "col-md-4";
        col.innerHTML = `
          <div class="card meal-card h-100">
            <img src="${p.strMealThumb || 'https://via.placeholder.com/200'}" class="card-img-top">
            <div class="card-body d-flex flex-column">
              <h5 class="card-title">${p.strMeal}</h5>
              <p class="text-muted small">${p.strCategory}</p>
              <p class="fw-bold mt-auto">€ ${p.prezzo.toFixed(2)}</p>
              <button class="btn btn-primary" onclick="aggiungiPiatto('${p._id}')">Aggiungi al mio Menu</button>
            </div>
          </div>`;
        container.appendChild(col);
      });
      updatePagination();
    }

    async function aggiungiPiatto(mealId) {
      try {
        // Poiché il ristorante non ha un array 'menu' nel backend fornito,
        // modifichiamo il 'ristorante_id' del piatto per assegnarlo a noi.
        const res = await fetchAuth(`${apiBase}/meals/${mealId}`, {
          method: "PUT",
          body: JSON.stringify({ ristorante_id: mioRistorante._id })
        });

        if (res.ok) {
          alert("Piatto aggiunto con successo!");
          // Rimuovi dalla vista locale
          filteredMeals = filteredMeals.filter(m => m._id !== mealId);
          displayPage(currentPage);
        } else {
          alert("Errore nell'aggiunta");
        }
      } catch (err) {
        console.error(err);
      }
    }

    function updatePagination() {
      const total = Math.ceil(filteredMeals.length / itemsPerPage);
      document.getElementById("paginationControls").innerHTML = 
        `Pagina ${currentPage} di ${total}`;
    }

    document.getElementById("applyFilter").onclick = () => {
      const nome = document.getElementById("filterName").value.toLowerCase();
      const cat = document.getElementById("filterCategory").value;
      
      filteredMeals = allMeals.filter(m => {
        return (nome === "" || m.strMeal.toLowerCase().includes(nome)) &&
               (cat === "" || m.strCategory === cat) &&
               (m.ristorante_id !== mioRistorante._id);
      });
      displayPage(1);
    };

    init();
  </script>
</body>
</html>
